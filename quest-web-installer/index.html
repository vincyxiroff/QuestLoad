<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestLoad</title>
  <style>
    :root {
      --bg: #000;
      --surface: #050505;
      --border: #fff;
      --text: #fff;
      --muted: rgba(255, 255, 255, .75);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center;
      padding: 24px 16px;
    }
    .wrap { width: min(980px, 100%); }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: .03em; }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 16px; line-height: 1.45; }
    .card { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
    .section { padding: 16px; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .step-section { opacity: 1; transform: translateY(0); }
    .step-section.is-leaving { opacity: 0; transform: translateY(8px); transition: opacity .22s ease, transform .22s ease; }
    .step-section.is-hidden { display: none; }
    .step-section.is-entering { animation: stepFadeIn .24s ease; }
    @keyframes stepFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .section--disabled { opacity: .4; pointer-events: none; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      appearance: none; border: 1px solid var(--border);
      background: transparent; color: var(--text);
      padding: 10px 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: rgba(255, 255, 255, .12); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .picker {
      border: 1px solid var(--border); padding: 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; gap: 10px;
    }
    .picker strong { display: block; font-size: 13px; }
    .picker span { display: block; font-size: 12px; color: var(--muted); margin-top: 4px; }
    .tag { font-size: 11px; padding: 4px 8px; border: 1px solid var(--border); white-space: nowrap; }
    .progress-wrap { border-top: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .progress-head { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); }
    .progress-track { width: 100%; height: 12px; border: 1px solid var(--border); }
    .progress-fill { height: 100%; width: 0%; background: #fff; transition: width .2s ease; }
    .latest-log {
      height: 120px; overflow-y: auto; font-size: 12px;
      line-height: 1.5; color: #fff; font-family: monospace;
      background: rgba(255,255,255,0.03); padding: 8px;
    }
    .latest-log div { margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>QuestLoad</h1>
    <div class="sub">Install apps on Meta Quest devices. Developer mode required. <b>By Frizzle.</b></div>
    <div class="card">
      <div class="section step-section" id="connectStepSection">
        <div class="title">1. Connection</div>
        <div class="actions">
          <button id="connect">Connect Quest</button>
          <button id="disconnect">Disconnect</button>
        </div>
      </div>
      <div class="section section--disabled step-section is-hidden" id="installStepSection">
        <div class="title">2. Selection</div>
        <div class="grid">
          <div class="picker" id="apkPick">
            <div><strong id="apkLabel">Select APK</strong><span>Drop .apk here</span></div>
            <div class="tag">APK</div>
            <input type="file" id="apk" accept=".apk" style="display:none">
          </div>
          <div class="picker" id="bundlePick">
            <div><strong id="bundleLabel">Select Bundle</strong><span>Folder with APK + OBB</span></div>
            <div class="tag">FOLDER</div>
            <input type="file" id="bundle" webkitdirectory multiple style="display:none">
          </div>
        </div>
      </div>
      <div class="section section--disabled step-section is-hidden" id="installActionsSection">
        <div class="title">3. Execution</div>
        <div class="actions">
          <button id="install">Install APK</button>
          <button id="installBundle">Install Bundle</button>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-head"><span>System Status</span><span id="progressPercent">0%</span></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="latest-log" id="latestLog">Ready.</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    const isConn = () => document.body.dataset.questConnected === 'true';
    const apkInput = document.getElementById('apk');
    const bundleInput = document.getElementById('bundle');

    document.getElementById('apkPick').onclick = () => isConn() && apkInput.click();
    document.getElementById('bundlePick').onclick = () => isConn() && bundleInput.click();

    apkInput.onchange = () => {
      if(apkInput.files[0]) document.getElementById('apkLabel').textContent = apkInput.files[0].name;
    };
    bundleInput.onchange = () => {
      if(bundleInput.files.length) document.getElementById('bundleLabel').textContent = `Folder: ${bundleInput.files.length} files`;
    };

    const apkPick = document.getElementById('apkPick');
    apkPick.ondragover = (e) => { e.preventDefault(); apkPick.style.background = 'rgba(255,255,255,0.1)'; };
    apkPick.ondragleave = () => { apkPick.style.background = 'transparent'; };
    apkPick.ondrop = (e) => {
      e.preventDefault();
      apkPick.style.background = 'transparent';
      if(!isConn() || !e.dataTransfer.files[0]) return;
      if(!e.dataTransfer.files[0].name.endsWith('.apk')) return;
      apkInput.files = e.dataTransfer.files;
      apkInput.dispatchEvent(new Event('change', { bubbles: true }));
    };
  </script>
</body>
</html>
